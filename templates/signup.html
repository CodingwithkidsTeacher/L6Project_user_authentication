{% extends "layout.html" %}
{% block content %}
    <div class="content-section">
        <form method="POST" action="/signup">
            <fieldset class="form-group">
                <legend class="border-bottom mb-4">Register</legend>
                {% if error %}
                <div class="alert alert-danger">
                  {{ error }}
                </div>
                {% endif %} 
                 <div class="form-group">
                    <input type="text" class="form-control" name="username" placeholder="Username" required="required">
                </div>
                <div class="form-group">
                    <input type="password" class="form-control" name="password" placeholder="Password" required="required">
                </div>
                <div class="form-group">
                    <input type="password" class="form-control" name="confirm-password" placeholder="Confirm Password" required="required">
                </div>
            </fieldset>
            <div class="form-group">
                <button type="submit" class="btn btn-outline-info">Sign Up</button>
            </div>
        </form>
    </div>
     <div class="border-top pt-3">
        <small class="text-muted">
            Already Have An Account? <a class="ml-2" href="/login">Sign In</a>
        </small>
    </div>
{% endblock content %}
